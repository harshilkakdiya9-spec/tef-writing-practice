<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>TEF HTML Application</title>
</head>
<body>
    <header>
        <h1>TEF HTML Application</h1>
    </header>
    <main>
        <section>
            <h2>Welcome to the TEF Writing Practice Application</h2>
            <p>This application will help you practice your writing skills in a structured manner.</p>
            <form action="#" method="post">
                <label for="text-input">Write your text here:</label><br>
                <textarea id="text-input" name="text-input" rows="10" cols="50"></textarea><br>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 TEF Writing Practice</p>
    </footer>
</body>
</html>
